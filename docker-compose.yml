services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: gojobberx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gojobberx"]
      interval: 2s
      timeout: 3s
      retries: 10
    networks:
      - default

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_URL=postgres://postgres:password@postgres:5432/gojobberx?sslmode=disable
    ports:
      - "8080:8080"
    stop_grace_period: 30s
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - default

volumes:
  pgdata:

networks:
  default:
    name: gojobberx_net
